<!DOCTYPE html>
<html>
<head>
  <title>YouTube Music Style Receiver</title>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Roboto', sans-serif;
      background-color: #000;
      color: white;
    }

    /* We hide the default player UI, but keep it in the DOM so the SDK can play audio behind the scenes */
    cast-media-player {
      display: none;
    }

    /* 1. The heavily blurred, dark background layer */
    #bg-layer {
      position: absolute;
      top: -10%; left: -10%; width: 120%; height: 120%;
      background-size: cover;
      background-position: center;
      filter: blur(40px) brightness(0.3); /* YTM aesthetic */
      z-index: 1;
      transition: background-image 1s ease;
    }

    /* 2. The main layout container */
    #ui-layer {
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0; /* Hidden when idle */
      transition: opacity 0.5s ease;
    }

    #album-art {
      width: 400px;
      height: 400px;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      object-fit: cover;
      margin-bottom: 40px;
    }

    #track-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin: 0 0 10px 0;
      text-align: center;
      max-width: 80%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #track-artist {
      font-size: 1.5rem;
      color: #aaaaaa;
      margin: 0 0 50px 0;
      text-align: center;
    }

    /* 3. The Custom Progress Bar */
    #progress-container {
      width: 60%;
      height: 4px;
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      position: relative;
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background-color: #ffffff;
      border-radius: 2px;
      transition: width 0.1s linear;
    }

    #time-container {
      width: 60%;
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 0.9rem;
      color: #aaaaaa;
    }

    /* 4. A clean Idle Screen */
    #idle-screen {
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0f0f0f;
      transition: opacity 0.5s ease;
    }

    #idle-screen h1 {
      font-size: 2rem;
      color: rgba(255,255,255,0.4);
      font-weight: 400;
    }
  </style>
</head>
<body>

  <cast-media-player></cast-media-player>

  <div id="idle-screen">
    <h1>Ready to Cast</h1>
  </div>

  <div id="bg-layer"></div>

  <div id="ui-layer">
    <img id="album-art" src="" />
    <h1 id="track-title"></h1>
    <h2 id="track-artist"></h2>
    
    <div id="progress-container">
      <div id="progress-fill"></div>
    </div>
    <div id="time-container">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>
  </div>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    
    // UI Elements
    const uiLayer = document.getElementById('ui-layer');
    const idleScreen = document.getElementById('idle-screen');
    const bgLayer = document.getElementById('bg-layer');
    const albumArt = document.getElementById('album-art');
    const trackTitle = document.getElementById('track-title');
    const trackArtist = document.getElementById('track-artist');
    const progressFill = document.getElementById('progress-fill');
    const timeCurrent = document.getElementById('time-current');
    const timeTotal = document.getElementById('time-total');

    // Helper to format raw seconds into M:SS
    function formatTime(sec) {
      if (isNaN(sec) || sec < 0) return "0:00";
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    // Initialize the PlayerDataBinder (Google's official custom UI tool)
    const playerData = new cast.framework.ui.PlayerData();
    const playerDataBinder = new cast.framework.ui.PlayerDataBinder(playerData);

    // Fade screens in and out based on player state
    playerDataBinder.addEventListener(
      cast.framework.ui.PlayerDataEventType.STATE_CHANGED,
      (e) => {
        if (e.value === cast.framework.ui.State.PLAYING || 
            e.value === cast.framework.ui.State.BUFFERING || 
            e.value === cast.framework.ui.State.PAUSED) {
          idleScreen.style.opacity = '0';
          uiLayer.style.opacity = '1';
        } else {
          idleScreen.style.opacity = '1';
          uiLayer.style.opacity = '0';
        }
      }
    );

    // Update Text and Images when the song changes
    playerDataBinder.addEventListener(
      cast.framework.ui.PlayerDataEventType.ANY_CHANGE,
      () => {
        trackTitle.innerText = playerData.title || "Unknown Title";
        trackArtist.innerText = (playerData.metadata && playerData.metadata.artist) ? playerData.metadata.artist : "";

        if (playerData.thumbnailUrl) {
            albumArt.src = playerData.thumbnailUrl;
            // Apply the same image to the blurred background layer
            bgLayer.style.backgroundImage = `url('${playerData.thumbnailUrl}')`;
        }
      }
    );

    // Automatically update the custom progress bar every second
    playerDataBinder.addEventListener(
      cast.framework.ui.PlayerDataEventType.CURRENT_TIME_CHANGED,
      (e) => {
        const current = e.value;
        const total = playerData.duration;
        
        timeCurrent.innerText = formatTime(current);
        timeTotal.innerText = formatTime(total);
        
        if (total > 0) {
          const pct = (current / total) * 100;
          progressFill.style.width = `${pct}%`;
        }
      }
    );

    // Start the Cast receiver
    context.start();
  </script>
</body>
</html>
